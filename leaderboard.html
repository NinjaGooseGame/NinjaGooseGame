<body>

  <!-- 🔁 Shared header (laddas av include.js) -->
  <div id="header"></div>
<script>
  function resizeStretch() {
    const main = document.querySelector("main");
    // Nollställ först så den kan shrinka om fönstret ändras
    main.style.minHeight = "";
    const pageHeight = document.body.scrollHeight;
    const viewportHeight = window.innerHeight;
    
    if (pageHeight < viewportHeight) {
      // Content för kort → stretcha upp
      main.style.minHeight = viewportHeight + "px";
    }
  }

  window.addEventListener("load", resizeStretch);
  window.addEventListener("resize", resizeStretch);
</script>

<script>
  window.addEventListener("load", function() {
    const main = document.querySelector("main");
    main.style.minHeight = "100vh";
    main.style.display = "flex";
    main.style.alignItems = "center";       // vertikalt centrerat
    main.style.justifyContent = "center";   // horisontellt centrerat

    const section = main.querySelector("section");
    section.style.width = "50%";            // 50% av skärmen
    section.style.textAlign = "center";     // centrera text
    const img = section.querySelector("img");
    img.style.maxWidth = "100%";
    img.style.height = "auto";

  });
</script>
  <!-- CONTENT START -->
  <main>
    <section class="block block-small">
      <h2 data-i18n="community.title">LEADERBOARD</h2>
      <p data-i18n="community.desc">UNDER CONSTRUCTION</p> <i data-i18n style; underline= "community.desc"></p>Coming soon :-)</p>

    </section>
  </main>
  </main>
  <!-- CONTENT END -->

  <!-- Scripts -->

  <script src="./js/i18n.js" defer></script>
  <script src="./js/theme-color.js" defer></script>
</body>
